<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AW Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0d0d;--surface:#161616;--surface2:#1e1e1e;--border:#2a2a2a;--border2:#3a3a3a;
  --accent:#e85d04;--accent2:#f48c06;--text:#ede9e0;--muted:#777;--muted2:#999;
  --kev:#e85d04;--domme:#4361ee;
}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:3px;background:#0a0a0a;}
::-webkit-scrollbar-thumb{background:#222;border-radius:2px;}
input,select,textarea{font-family:'DM Mono',monospace!important;}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.3);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

/* ── NUTZER WAHL ── */
#nutzer-screen{
  position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:999;gap:2rem;
}
.nw-logo{font-family:'Bebas Neue',monospace;font-size:2.8rem;color:var(--accent);letter-spacing:.08em;}
.nw-sub{font-size:.7rem;color:var(--muted2);letter-spacing:.18em;text-transform:uppercase;margin-top:-.5rem;}
.nw-btns{display:flex;gap:1rem;}
.nw-btn{
  padding:1rem 2.2rem;border:2px solid var(--border2);background:none;
  color:#666;font-family:'Bebas Neue',monospace;font-size:1.8rem;letter-spacing:.06em;
  border-radius:8px;cursor:pointer;transition:all .2s;
}
.nw-btn:hover{border-color:#555;color:#999;}
.nw-btn.kev{border-color:var(--kev);color:var(--kev);background:rgba(232,93,4,.08);}
.nw-btn.domme{border-color:var(--domme);color:var(--domme);background:rgba(67,97,238,.08);}

/* ── HEADER ── */
header{
  background:#080808;border-bottom:1px solid #141414;
  padding:10px 14px 8px;display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;z-index:100;
}
.h-left .h-title{font-family:'Bebas Neue',monospace;font-size:1.5rem;color:var(--accent);letter-spacing:.08em;}
.h-left .h-sub{font-size:.6rem;color:#555;letter-spacing:.16em;text-transform:uppercase;}
.h-user{
  font-family:'Bebas Neue',monospace;font-size:1.1rem;letter-spacing:.06em;
  padding:.3rem .8rem;border-radius:5px;cursor:pointer;border:1px solid;
  transition:all .2s;
}
.h-user.kev{color:var(--kev);border-color:var(--kev);background:rgba(232,93,4,.08);}
.h-user.domme{color:var(--domme);border-color:var(--domme);background:rgba(67,97,238,.08);}

/* ── TABS ── */
.tabs{
  display:flex;border-bottom:1px solid #181818;background:#0c0c0c;
  position:sticky;top:57px;z-index:99;overflow-x:auto;
}
.tab-btn{
  flex:1;min-width:70px;padding:11px 4px;font-size:.55rem;font-weight:500;
  letter-spacing:.16em;text-transform:uppercase;background:none;border:none;
  color:#666;cursor:pointer;transition:all .2s;white-space:nowrap;
  border-bottom:2px solid transparent;font-family:'DM Mono',monospace;
}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-btn.active.domme-tab{color:var(--domme);border-bottom-color:var(--domme);}

/* ── BODY ── */
.body{padding:12px 13px;max-width:500px;margin:0 auto;}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:7px;margin-bottom:9px;overflow:hidden;animation:fadeUp .3s ease both;}
.card-head{padding:9px 12px;border-bottom:1px solid #2a2a2a;display:flex;justify-content:space-between;align-items:center;}
.card-body{padding:11px 12px;}

/* ── LABELS / INPUTS ── */
.lbl{font-size:.53rem;color:#666;letter-spacing:.16em;text-transform:uppercase;margin-bottom:3px;margin-top:9px;display:block;}
.inp{width:100%;background:#1c1c1c;border:1px solid #2e2e2e;border-radius:5px;padding:7px 9px;color:var(--text);font-size:.85rem;outline:none;}
.inp:focus{border-color:#333;}
.s-inp{width:100%;background:#1c1c1c;border:1px solid #2a2a2a;border-radius:5px;padding:5px 7px;color:var(--text);font-size:.8rem;outline:none;}
textarea.inp{resize:vertical;min-height:60px;}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:8px 13px;border-radius:5px;border:none;
  font-family:'DM Mono',monospace;font-size:.75rem;letter-spacing:.06em;
  cursor:pointer;transition:all .15s;
}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent2);}
.btn-primary.domme-color{background:var(--domme);}
.btn-primary.domme-color:hover{background:#3451d1;}
.btn-ghost{background:none;border:1px solid #333;color:#888;}
.btn-ghost:hover{border-color:#555;color:#bbb;}
.btn-danger{background:none;border:1px solid #5a2a2a;color:#cc4444;}
.btn-danger:hover{border-color:#7a2c2c;color:#c04040;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-full{width:100%;justify-content:center;padding:10px;}

/* ── BADGES ── */
.badge{display:inline-block;font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border-radius:3px;}
.badge-strength{background:rgba(232,93,4,.15);color:#e85d04;}
.badge-iso{background:rgba(106,153,78,.15);color:#6a994e;}
.badge-sparring{background:rgba(67,97,238,.15);color:#4361ee;}
.badge-technique{background:rgba(114,9,183,.15);color:#9b5de5;}

/* ── NO DATA ── */
.no-data{text-align:center;color:#555;padding:30px 0;font-size:.7rem;letter-spacing:.1em;}

/* ── STATUS ── */
.status{text-align:center;font-size:.75rem;margin-top:8px;min-height:1.1rem;color:#888;}
.status.ok{color:#4cff91;}
.status.err{color:#ff4444;}

/* ── PRESET PILLS ── */
.preset-pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.pill{padding:4px 9px;border:1px solid #333;border-radius:20px;background:none;color:#888;font-family:'DM Mono',monospace;font-size:.65rem;cursor:pointer;transition:all .15s;}
.pill:hover{border-color:#555;color:#bbb;}

/* ── SET ROW ── */
.set-grid{display:grid;grid-template-columns:1.2fr 1fr 1.2fr auto;gap:5px;align-items:center;}
.set-header span{font-size:.52rem;color:#666;letter-spacing:.1em;text-transform:uppercase;}

/* ── RING ── */
.ring-wrap{text-align:center;animation:fadeUp .5s ease both;}
.ring-label{font-family:'DM Mono',monospace;font-size:.5rem;color:#777;letter-spacing:.12em;text-transform:uppercase;margin-top:4px;}
.rings-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;}

/* ── HERO ── */
.hero{position:relative;overflow:hidden;background:#0c0c0c;border-bottom:1px solid #181818;}
.hero-dot-grid{position:absolute;inset:0;background-image:radial-gradient(#252525 1px,transparent 1px);background-size:18px 18px;opacity:.5;}
.hero-stripe{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);}
.hero-inner{position:relative;padding:14px 14px 10px;}
.hero-tag{font-size:.55rem;color:var(--accent);letter-spacing:.2em;text-transform:uppercase;margin-bottom:8px;}
.stat-strip{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;border-top:1px solid #2a2a2a;}
.stat-cell{text-align:center;padding:8px 4px;border-right:1px solid #181818;}
.stat-cell:last-child{border-right:none;}
.stat-cell-lbl{font-size:.48rem;color:#777;letter-spacing:.12em;text-transform:uppercase;margin-bottom:2px;}
.stat-cell-val{font-family:'Bebas Neue',monospace;font-size:1.1rem;color:#e0dcd4;line-height:1;}
.stat-cell-unit{font-size:.48rem;color:#666;margin-top:1px;}
.prog-bar-wrap{margin:11px 0 9px;}
.prog-bar-top{display:flex;justify-content:space-between;margin-bottom:4px;}
.prog-bar-top span{font-size:.5rem;color:#888;letter-spacing:.1em;}
.prog-bar-track{height:3px;background:#181818;border-radius:2px;overflow:hidden;}
.prog-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 1s ease;}

/* ── CHARTS ── */
.chart-container{padding:10px 2px;}
.chart-mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px;}

/* ── VERGLEICH ── */
.vs-header{text-align:center;padding:20px 0 10px;}
.vs-title{font-family:'Bebas Neue',monospace;font-size:2rem;letter-spacing:.1em;}
.vs-title .kev-c{color:var(--kev);}
.vs-title .domme-c{color:var(--domme);}
.vs-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin-bottom:12px;}
.vs-label{font-size:.55rem;color:#333;letter-spacing:.12em;text-transform:uppercase;text-align:center;margin-bottom:8px;}
.vs-val{font-family:'Bebas Neue',monospace;font-size:1.6rem;line-height:1;}
.vs-val.kev-c{color:var(--kev);}
.vs-val.domme-c{color:var(--domme);}
.vs-unit{font-size:.55rem;color:#333;}
.vs-divider{font-family:'Bebas Neue',monospace;font-size:1.2rem;color:#444;text-align:center;}
.vs-bar-row{margin-bottom:10px;}
.vs-bar-label{display:flex;justify-content:space-between;font-size:.55rem;color:#777;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.vs-bar-track{height:6px;background:#181818;border-radius:3px;overflow:hidden;display:flex;}
.vs-bar-kev{height:100%;background:var(--kev);border-radius:3px 0 0 3px;transition:width 1s ease;}
.vs-bar-domme{height:100%;background:var(--domme);border-radius:0 3px 3px 0;transition:width 1s ease;}
.vs-bmi-card{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:12px;margin-bottom:9px;}
.vs-bmi-title{font-size:.6rem;color:#888;letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px;}
</style>
</head>
<body>

<!-- NUTZER WAHL -->
<div id="nutzer-screen">
  <div>
    <div class="nw-logo">Iron Grip</div>
    <div class="nw-sub">Armwrestling Tracker</div>
  </div>
  <div class="nw-btns">
    <button class="nw-btn kev" onclick="setNutzer('Kev')">Kev</button>
    <button class="nw-btn domme" onclick="setNutzer('Domme')">Domme</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <header>
    <div class="h-left">
      <div class="h-title">Iron Grip</div>
      <div class="h-sub">Armwrestling Tracker</div>
    </div>
    <button class="h-user" id="h-user-btn" onclick="wechselNutzer()">Kev</button>
  </header>

  <div class="tabs">
    <button class="tab-btn active" id="tab-training" onclick="setTab('training')">Training</button>
    <button class="tab-btn" id="tab-masse" onclick="setTab('masse')">Maße</button>
    <button class="tab-btn" id="tab-charts" onclick="setTab('charts')">Charts</button>
    <button class="tab-btn" id="tab-vergleich" onclick="setTab('vergleich')">Vergleich</button>
  </div>

  <div class="body">
    <div id="page-training"></div>
    <div id="page-masse" style="display:none;"></div>
    <div id="page-charts" style="display:none;"></div>
    <div id="page-vergleich" style="display:none;"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxp9V1et_41Tfu2MmbnSsm-j4LKiq-xilD4Jhb40J1i8wBVEYwL77mLkKRsavR54BQ/exec';

const NUTZER_GROESSE = { Kev: 174, Domme: 181 };
const NUTZER_FARBE = { Kev: 'kev', Domme: 'domme' };

const PRESET_UEBUNGEN = [
  { name:'Back Pressure Gurt', unit:'kg', type:'strength' },
  { name:'Micros', unit:'kg', type:'strength' },
  { name:'Hammer Curls', unit:'kg', type:'strength' },
  { name:'Dome High-Pulls', unit:'kg', type:'iso' },
  { name:'Pronation u. Last', unit:'kg', type:'strength' },
  { name:'HG-Extension', unit:'kg', type:'strength' },
  { name:'1-vs-2 Redlining', unit:'Runden', type:'sparring' },
  { name:'Toproll Positions', unit:'min', type:'technique' },
];

const MASS_FELDER = [
  { key:'bodyweight', label:'Körpergewicht', unit:'kg' },
  { key:'unterarm', label:'Unterarm', unit:'cm' },
  { key:'oberarm', label:'Oberarm', unit:'cm' },
  { key:'handgelenk', label:'Handgelenk', unit:'cm' },
  { key:'phasenwinkel', label:'Phasenwinkel', unit:'°' },
];

let aktiverNutzer = null;
let aktiverTab = 'training';
let alleDaten = [];
let expandiert = {};

const today = () => new Date().toISOString().slice(0,10);
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const fmt = d => new Date(d+'T00:00:00').toLocaleDateString('de-DE',{day:'2-digit',month:'short',year:'2-digit'});

// ── NUTZER ──
function setNutzer(nutzer) {
  aktiverNutzer = nutzer;
  document.getElementById('nutzer-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  const btn = document.getElementById('h-user-btn');
  btn.textContent = nutzer;
  btn.className = 'h-user ' + NUTZER_FARBE[nutzer];
  // Accent color
  if(nutzer === 'Domme') {
    document.documentElement.style.setProperty('--accent','#4361ee');
    document.documentElement.style.setProperty('--accent2','#3451d1');
  } else {
    document.documentElement.style.setProperty('--accent','#e85d04');
    document.documentElement.style.setProperty('--accent2','#f48c06');
  }
  datenLaden().then(() => renderTab(aktiverTab));
}

function wechselNutzer() {
  aktiverNutzer = null;
  document.getElementById('nutzer-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.documentElement.style.setProperty('--accent','#e85d04');
  document.documentElement.style.setProperty('--accent2','#f48c06');
}

// ── TABS ──
function setTab(tab) {
  aktiverTab = tab;
  ['training','masse','charts','vergleich'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    document.getElementById('page-'+t).style.display = t===tab?'block':'none';
  });
  renderTab(tab);
}

function renderTab(tab) {
  if(tab==='training') renderTraining();
  else if(tab==='masse') renderMasse();
  else if(tab==='charts') renderCharts();
  else if(tab==='vergleich') renderVergleich();
}

// ── DATEN ──
async function datenLaden() {
  try {
    const r = await fetch(SCRIPT_URL);
    const json = await r.json();
    const rows = json.data || [];
    alleDaten = rows.slice(1).map(r => ({
      timestamp: r[0],
      nutzer: r[1],
      typ: r[2],
      datum: r[3],
      daten: typeof r[4]==='string' ? JSON.parse(r[4]) : r[4]
    })).filter(r => r.nutzer && r.typ);
  } catch(e) {
    alleDaten = [];
  }
}

function meineDaten(typ) {
  return alleDaten.filter(r => r.nutzer===aktiverNutzer && r.typ===typ)
    .sort((a,b) => b.datum.localeCompare(a.datum));
}

function alleDatenVon(nutzer, typ) {
  return alleDaten.filter(r => r.nutzer===nutzer && r.typ===typ)
    .sort((a,b) => b.datum.localeCompare(a.datum));
}

async function speichern(typ, datum, daten) {
  const payload = JSON.stringify({ nutzer:aktiverNutzer, typ, datum, daten });
  // Use a form POST via hidden iframe to avoid CORS issues while keeping body intact
  await new Promise((resolve) => {
    const form = document.createElement('form');
    form.method = 'POST';
    form.action = SCRIPT_URL;
    form.target = 'hidden-iframe';
    form.style.display = 'none';
    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = 'payload';
    input.value = payload;
    form.appendChild(input);
    let iframe = document.getElementById('hidden-iframe');
    if(!iframe){
      iframe = document.createElement('iframe');
      iframe.name = 'hidden-iframe';
      iframe.id = 'hidden-iframe';
      iframe.style.display = 'none';
      document.body.appendChild(iframe);
    }
    iframe.onload = () => resolve();
    document.body.appendChild(form);
    form.submit();
    document.body.removeChild(form);
    // Resolve after timeout in case onload doesn't fire
    setTimeout(resolve, 2000);
  });
  await new Promise(r => setTimeout(r, 1500));
  await datenLaden();
}

// ── RING SVG ──
function ringHTML(value, unit, label, progress, color, index=0) {
  const SZ=90, r=32, cx=SZ/2, cy=SZ/2;
  const C = 2*Math.PI*r;
  const dash = C * Math.max(0, Math.min(1, progress||0));
  const tipAngle = ((progress||0)*360-90)*Math.PI/180;
  const tx = cx+r*Math.cos(tipAngle), ty = cy+r*Math.sin(tipAngle);
  const ticks = Array.from({length:32},(_,i)=>{
    const a=(i/32*360-90)*Math.PI/180;
    const major=i%8===0, ro=r+7, rl=major?5:2.5;
    return `<line x1="${cx+ro*Math.cos(a)}" y1="${cy+ro*Math.sin(a)}" x2="${cx+(ro+rl)*Math.cos(a)}" y2="${cy+(ro+rl)*Math.sin(a)}" stroke="${major?'#282828':'#1e1e1e'}" stroke-width="${major?1.2:.7}"/>`;
  }).join('');
  return `
    <div class="ring-wrap" style="animation-delay:${index*.15}s">
      <svg width="${SZ}" height="${SZ}" style="overflow:visible">
        ${ticks}
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#181818" stroke-width="6.5"/>
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none"
          stroke="${color}" stroke-width="5" stroke-linecap="round"
          stroke-dasharray="${C}" stroke-dashoffset="${C-dash}"
          transform="rotate(-90 ${cx} ${cy})"
          style="filter:drop-shadow(0 0 5px ${color}88);transition:stroke-dashoffset 1.2s cubic-bezier(.34,1.2,.64,1)"/>
        ${(progress||0)>0.03?`<circle cx="${tx}" cy="${ty}" r="3" fill="${color}" style="filter:drop-shadow(0 0 4px ${color})"/>`:``}
        <text x="${cx}" y="${cy-6}" text-anchor="middle" style="font-family:'Bebas Neue',monospace;font-size:17px;fill:#ede9e0;">${value}</text>
        <text x="${cx}" y="${cy+10}" text-anchor="middle" style="font-family:'DM Mono',monospace;font-size:7px;fill:#888;">${unit}</text>
      </svg>
      <div class="ring-label">${label}</div>
    </div>`;
}

// ── HERO ──
function heroHTML() {
  const masse = meineDaten('masse');
  const training = meineDaten('training');
  const lat = masse[0]?.daten || {};
  const cw = lat.bodyweight ? +lat.bodyweight : 0;
  const cp = lat.phasenwinkel ? +lat.phasenwinkel : 0;

  const getMax = name => {
    let m=0;
    training.forEach(s=>s.daten.exercises?.filter(e=>e.name===name).forEach(ex=>ex.sets?.forEach(st=>{if(+st.weight>m)m=+st.weight;})));
    return m||0;
  };
  const bp = getMax('Back Pressure Gurt');
  const mic = getMax('Micros');
  const nutzerColor = aktiverNutzer==='Kev' ? '#e85d04' : '#4361ee';

  return `
    <div class="hero">
      <div class="hero-dot-grid"></div>
      <div class="hero-stripe" style="background:linear-gradient(90deg,transparent,${nutzerColor},transparent)"></div>
      <div class="hero-inner">
        <div class="hero-tag">${aktiverNutzer} — Übersicht</div>
        <div class="rings-grid">
          ${ringHTML(cw?cw.toFixed(1):'—','kg','Gewicht',cw?cw/120:0,nutzerColor,0)}
          ${ringHTML(bp||'—','kg','Back Pressure',bp/75,nutzerColor,1)}
          ${ringHTML(mic||'—','kg','Micros',mic/75,nutzerColor,2)}
        </div>
        <div class="stat-strip">
          ${[
            ['UA', lat.unterarm?lat.unterarm+'cm':'—', ''],
            ['OA', lat.oberarm?lat.oberarm+'cm':'—', ''],
            ['HG', lat.handgelenk?lat.handgelenk+'cm':'—', ''],
            ['PW', cp?cp+'°':'—', ''],
          ].map(([l,v,u])=>`
            <div class="stat-cell">
              <div class="stat-cell-lbl">${l}</div>
              <div class="stat-cell-val" style="font-size:.9rem">${v}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>`;
}

// ── TRAINING ──
let trainingOffen = false;
let trainingForm = { date: today(), notes: '', exercises: [] };

function renderTraining() {
  const sessions = meineDaten('training');
  const nutzerColor = aktiverNutzer==='Kev' ? 'btn-primary' : 'btn-primary domme-color';
  let html = heroHTML();

  if(!trainingOffen) {
    html += `<button class="btn ${nutzerColor} btn-full" style="margin:12px 0 10px" onclick="trainingOeffnen()">+ Neue Einheit</button>`;
  } else {
    html += trainingFormHTML();
  }

  if(!sessions.length) {
    html += `<div class="no-data">— noch keine Einheiten —</div>`;
  } else {
    sessions.forEach(s => {
      const exp = expandiert['t_'+s.timestamp];
      html += `
        <div class="card">
          <div class="card-head">
            <div style="display:flex;gap:8px;align-items:center">
              <span style="font-family:'Bebas Neue',monospace;font-size:1.1rem;color:var(--accent)">${fmt(s.datum)}</span>
              <span style="color:#777;font-size:.65rem">${s.daten.exercises?.length||0} Übung${s.daten.exercises?.length!==1?'en':''}</span>
            </div>
            <button class="btn btn-ghost" style="padding:3px 8px;font-size:.6rem" onclick="toggleExp('t_${s.timestamp}')">${exp?'▲':'▼'}</button>
          </div>
          ${exp ? trainingDetailHTML(s) : ''}
        </div>`;
    });
  }
  document.getElementById('page-training').innerHTML = html;
}

function trainingFormHTML() {
  const nutzerColor = aktiverNutzer==='Kev' ? 'btn-primary' : 'btn-primary domme-color';
  let exHtml = '';
  trainingForm.exercises.forEach((ex, ei) => {
    exHtml += `
      <div class="card" style="border-color:#232323;margin-bottom:8px">
        <div class="card-head">
          <div style="display:flex;gap:6px;align-items:center">
            <span style="font-size:.75rem;font-weight:600">${ex.name}</span>
            <span class="badge badge-${ex.type}">${ex.type}</span>
          </div>

        </div>

            <span>Last (${ex.unit})</span><span>Wdh.</span><span>Notiz</span><span></span>
          </div>

            <div class="set-grid" style="margin-bottom:4px">
              <input class="s-inp" placeholder="—" value="${s.weight}" oninput="updateSet(${ei},${si},'weight',this.value)">
              <input class="s-inp" placeholder="—" value="${s.reps}" oninput="updateSet(${ei},${si},'reps',this.value)">
              <input class="s-inp" placeholder="—" value="${s.notes}" oninput="updateSet(${ei},${si},'notes',this.value)">
              <button style="background:none;border:none;cursor:pointer;color:#7a2c2c;font-size:.7rem" onclick="removeSet(${ei},${si})">✕</button>
            </div>`).join('')}
          <button class="btn btn-ghost" style="font-size:.6rem;padding:3px 8px;margin-top:2px" onclick="addSet(${ei})">+ Satz</button>
        </div>
      </div>`;
  });

  return `
    <div class="card" style="margin:12px 0 10px">
      <div class="card-head">
        <span style="font-size:.7rem;color:var(--accent);letter-spacing:.14em;font-weight:600">NEUE EINHEIT</span>
        <button class="btn btn-ghost" style="font-size:.65rem;padding:4px 8px" onclick="trainingSchliessen()">Abbrechen</button>
      </div>
      <div class="card-body">
        <label class="lbl">Datum</label>
        <input type="date" class="inp" value="${trainingForm.date}" oninput="trainingForm.date=this.value">
        
        <label class="lbl">Preset-Übungen</label>
        <div class="preset-pills">
          ${PRESET_UEBUNGEN.map(ex=>`<button class="pill" onclick="addEx('${ex.name}','${ex.unit}','${ex.type}')">${ex.name}</button>`).join('')}
        </div>
        <div style="display:flex;gap:6px;margin-bottom:10px">
          <input class="inp" id="custom-ex-inp" placeholder="Eigene Übung…" style="flex:1">

        </div>
        
        ${exHtml}
        
        <label class="lbl">Session-Notizen</label>
        <textarea class="inp" placeholder="Notizen…" oninput="trainingForm.notes=this.value">${trainingForm.notes}</textarea>
        
        <button class="btn ${nutzerColor} btn-full" style="margin-top:12px" id="save-training-btn" onclick="trainingSpecihern()">Einheit speichern</button>
        <div class="status" id="status-training"></div>
      </div>
    </div>`;
}

function trainingDetailHTML(s) {
  let html = `<div class="card-body">`;
  (s.daten.exercises||[]).forEach(ex => {
    html += `<div style="margin-bottom:9px">
      <div style="display:flex;gap:6px;align-items:center;margin-bottom:4px">
        <span style="font-size:.75rem;font-weight:600">${ex.name}</span>
        <span class="badge badge-${ex.type}">${ex.type}</span>
      </div>`;
    (ex.sets||[]).forEach((st,j) => {
      html += `<div style="display:flex;gap:10px;font-size:.7rem;color:#888;padding:2px 0">
        <span style="color:#282828">#${j+1}</span>
        <span style="color:#c0bcb4">${st.weight} ${ex.unit}</span>
        ${st.reps?`<span>× ${st.reps}</span>`:''}
        ${st.notes?`<span style="color:#383838;font-style:italic">— ${st.notes}</span>`:''}
      </div>`;
    });
    html += `</div>`;
  });
  if(s.daten.notes) html += `<div style="margin-top:6px;padding:6px 9px;background:#111;border-radius:4px;font-size:.7rem;color:#888;font-style:italic">${s.daten.notes}</div>`;
  html += `</div>`;
  return html;
}

function trainingOeffnen() { trainingOffen=true; trainingForm={date:today(),notes:'',exercises:[]}; renderTraining(); }
function trainingSchliessen() { trainingOffen=false; renderTraining(); }
function addEx(name,unit,type) { trainingForm.exercises.push({name,unit,type,sets:[{weight:'',reps:'',notes:''}]}); renderTraining(); }
function addCustomEx() {
  const inp = document.getElementById('custom-ex-inp');
  if(inp&&inp.value.trim()) { addEx(inp.value.trim(),'—','strength'); }
}
function removeEx(i) { trainingForm.exercises.splice(i,1); renderTraining(); }
function addSet(ei) { trainingForm.exercises[ei].sets.push({weight:'',reps:'',notes:''}); renderTraining(); }
function removeSet(ei,si) { trainingForm.exercises[ei].sets.splice(si,1); renderTraining(); }
function updateSet(ei,si,field,val) { trainingForm.exercises[ei].sets[si][field]=val; }

async function trainingSpecihern() {
  if(!trainingForm.exercises.length) return;
  const btn = document.getElementById('save-training-btn');
  const st = document.getElementById('status-training');
  btn.disabled=true; st.textContent='Wird gespeichert…'; st.className='status';
  await speichern('training', trainingForm.date, { exercises:trainingForm.exercises, notes:trainingForm.notes });
  trainingOffen=false; trainingForm={date:today(),notes:'',exercises:[]};
  renderTraining();
}

// ── MASSE ──
let masseOffen = false;
let masseForm = { date: today() };
MASS_FELDER.forEach(f => masseForm[f.key]='');

function renderMasse() {
  const masse = meineDaten('masse');
  const nutzerColor = aktiverNutzer==='Kev' ? 'btn-primary' : 'btn-primary domme-color';
  let html = '';

  if(!masseOffen) {
    html += `<button class="btn ${nutzerColor} btn-full" style="margin-bottom:12px" onclick="masseOeffnen()">+ Neue Messung</button>`;
  } else {
    html += `
      <div class="card" style="margin-bottom:10px">
        <div class="card-head">
          <span style="font-size:.7rem;color:var(--accent);letter-spacing:.14em;font-weight:600">NEUE MESSUNG</span>
          <button class="btn btn-ghost" style="font-size:.65rem;padding:4px 8px" onclick="masseSchliessen()">Abbrechen</button>
        </div>
        <div class="card-body">
          <label class="lbl">Datum</label>
          <input type="date" class="inp" value="${masseForm.date}" oninput="masseForm.date=this.value">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px">
            ${MASS_FELDER.map(f=>`
              <div>
                <label class="lbl">${f.label} <span style="color:#2a2a2a">(${f.unit})</span></label>
                <input type="number" class="s-inp" placeholder="—" value="${masseForm[f.key]||''}" oninput="masseForm['${f.key}']=this.value">
              </div>`).join('')}
          </div>
          <button class="btn ${nutzerColor} btn-full" style="margin-top:14px" id="save-masse-btn" onclick="masseSpeichern()">Messung speichern</button>
          <div class="status" id="status-masse"></div>
        </div>
      </div>`;
  }

  if(!masse.length) {
    html += `<div class="no-data">— noch keine Messungen —</div>`;
  } else {
    masse.forEach(m => {
      const exp = expandiert['m_'+m.timestamp];
      html += `
        <div class="card">
          <div class="card-head">
            <span style="font-family:'Bebas Neue',monospace;font-size:1.1rem;color:var(--accent)">${fmt(m.datum)}</span>
            <div style="display:flex;gap:6px">
              <button class="btn btn-ghost" style="padding:3px 8px;font-size:.6rem" onclick="toggleExp('m_${m.timestamp}')">${exp?'▲':'▼'}</button>
            </div>
          </div>
          ${exp ? `<div class="card-body" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            ${MASS_FELDER.map(f=>m.daten[f.key]?`
              <div>
                <div style="font-size:.55rem;color:#777;margin-bottom:2px">${f.label}</div>
                <div style="font-family:'Bebas Neue',monospace;font-size:1.4rem;color:#ede9e0">
                  ${m.daten[f.key]} <span style="font-size:.6rem;color:#2e2e2e;font-family:'DM Mono',monospace">${f.unit}</span>
                </div>
              </div>` : '').join('')}
          </div>` : ''}
        </div>`;
    });
  }
  document.getElementById('page-masse').innerHTML = html;
}

function masseOeffnen() { masseOffen=true; masseForm={date:today()}; MASS_FELDER.forEach(f=>masseForm[f.key]=''); renderMasse(); }
function masseSchliessen() { masseOffen=false; renderMasse(); }
async function masseSpeichern() {
  const btn=document.getElementById('save-masse-btn');
  const st=document.getElementById('status-masse');
  btn.disabled=true; st.textContent='Wird gespeichert…'; st.className='status';
  const daten={};
  MASS_FELDER.forEach(f=>{ if(masseForm[f.key]) daten[f.key]=masseForm[f.key]; });
  await speichern('masse', masseForm.date, daten);
  masseOffen=false;
  renderMasse();
}

// ── CHARTS ──
let chartMode = 'exercise';
let chartSelEx = PRESET_UEBUNGEN[0].name;
let chartSelM = 'bodyweight';

function renderCharts() {
  const training = meineDaten('training');
  const masse = meineDaten('masse');

  const allEx = [...new Set([...PRESET_UEBUNGEN.map(e=>e.name), ...training.flatMap(s=>s.daten.exercises?.map(e=>e.name)||[])])];

  const exData = [];
  [...training].sort((a,b)=>a.datum.localeCompare(b.datum)).forEach(s=>{
    s.daten.exercises?.filter(e=>e.name===chartSelEx).forEach(ex=>{
      const ws=ex.sets?.map(st=>+st.weight).filter(v=>!isNaN(v)&&v>0)||[];
      if(ws.length) exData.push({date:fmt(s.datum), max:Math.max(...ws), avg:+(ws.reduce((a,b)=>a+b,0)/ws.length).toFixed(1)});
    });
  });

  const mData = [...masse].sort((a,b)=>a.datum.localeCompare(b.datum))
    .filter(m=>m.daten[chartSelM])
    .map(m=>({date:fmt(m.datum), value:+m.daten[chartSelM]}));

  const nutzerColor = aktiverNutzer==='Kev' ? '#e85d04' : '#4361ee';
  const nutzerColorFaded = aktiverNutzer==='Kev' ? '#e85d0477' : '#4361ee77';

  let html = `
    <div class="chart-mode-grid">
      <button class="btn ${chartMode==='exercise'?'btn-primary':'btn-ghost'}" onclick="setChartMode('exercise')">Übungen</button>
      <button class="btn ${chartMode==='measure'?'btn-primary':'btn-ghost'}" onclick="setChartMode('measure')">Maße</button>
    </div>`;

  if(chartMode==='exercise') {
    html += `
      <label class="lbl">Übung</label>
      <select class="inp" style="cursor:pointer;margin-bottom:12px" onchange="chartSelEx=this.value;renderCharts()">
        ${allEx.map(n=>`<option value="${n}" ${n===chartSelEx?'selected':''}>${n}</option>`).join('')}
      </select>`;

    if(exData.length<2) {
      html += `<div class="no-data">Mindestens 2 Einheiten mit dieser Übung nötig.</div>`;
    } else {
      html += `
        <div class="card">
          <div class="card-head"><span style="font-size:.65rem;letter-spacing:.1em">${chartSelEx}</span></div>
          <div class="chart-container">
            ${simpleLineChart(exData, ['max','avg'], [nutzerColor,nutzerColorFaded], ['Max kg','Ø kg'])}
          </div>
        </div>`;
    }
  } else {
    const mFeld = MASS_FELDER.find(f=>f.key===chartSelM);
    html += `
      <label class="lbl">Messgröße</label>
      <select class="inp" style="cursor:pointer;margin-bottom:12px" onchange="chartSelM=this.value;renderCharts()">
        ${MASS_FELDER.map(f=>`<option value="${f.key}" ${f.key===chartSelM?'selected':''}>${f.label} (${f.unit})</option>`).join('')}
      </select>`;

    if(mData.length<2) {
      html += `<div class="no-data">Mindestens 2 Messungen nötig.</div>`;
    } else {
      html += `
        <div class="card">
          <div class="card-head"><span style="font-size:.65rem;letter-spacing:.1em">${mFeld?.label}</span></div>
          <div class="chart-container">
            ${simpleLineChart(mData, ['value'], [nutzerColor], [mFeld?.label])}
          </div>
        </div>`;
    }
  }

  document.getElementById('page-charts').innerHTML = html;
}

function setChartMode(mode) { chartMode=mode; renderCharts(); }

function simpleLineChart(data, keys, colors, labels) {
  if(!data.length) return '';
  const W=340, H=160, PL=32, PR=10, PT=10, PB=28;
  const IW=W-PL-PR, IH=H-PT-PB;

  const allVals = data.flatMap(d=>keys.map(k=>d[k]||0));
  const minV=Math.min(...allVals), maxV=Math.max(...allVals);
  const range=maxV-minV||1;

  const toX = i => PL + (i/(data.length-1))*IW;
  const toY = v => PT + IH - ((v-minV)/range)*IH;

  let svg = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;overflow:visible">`;

  // Grid lines
  for(let i=0;i<=4;i++) {
    const y=PT+IH*(i/4);
    const v=(maxV-(range*i/4)).toFixed(1);
    svg+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="#2a2a2a" stroke-dasharray="3 3"/>`;
    svg+=`<text x="${PL-3}" y="${y+3}" text-anchor="end" style="font-family:'DM Mono',monospace;font-size:7px;fill:#888">${v}</text>`;
  }

  // X labels
  const step = Math.ceil(data.length/5);
  data.forEach((d,i)=>{
    if(i%step===0||i===data.length-1) {
      svg+=`<text x="${toX(i)}" y="${H-4}" text-anchor="middle" style="font-family:'DM Mono',monospace;font-size:7px;fill:#888">${d.date}</text>`;
    }
  });

  // Lines & dots
  keys.forEach((k,ki)=>{
    const pts=data.map((d,i)=>`${toX(i)},${toY(d[k]||0)}`).join(' ');
    svg+=`<polyline points="${pts}" fill="none" stroke="${colors[ki]}" stroke-width="${ki===0?2:1.5}" stroke-linejoin="round" stroke-linecap="round" opacity="${ki===0?1:.6}"/>`;
    if(ki===0) {
      data.forEach((d,i)=>{
        svg+=`<circle cx="${toX(i)}" cy="${toY(d[k]||0)}" r="3" fill="${colors[ki]}" style="filter:drop-shadow(0 0 3px ${colors[ki]})"/>`;
      });
    }
  });

  svg+=`</svg>`;
  return svg;
}

// ── VERGLEICH ──
function renderVergleich() {
  const kevMasse = alleDatenVon('Kev','masse');
  const dommeMasse = alleDatenVon('Domme','masse');
  const kevLat = kevMasse[0]?.daten || {};
  const dommeLat = dommeMasse[0]?.daten || {};

  const kevGew = +kevLat.bodyweight||0;
  const dommeGew = +dommeLat.bodyweight||0;
  const kevUA = +kevLat.unterarm||0;
  const dommeUA = +dommeLat.unterarm||0;
  const kevOA = +kevLat.oberarm||0;
  const dommeOA = +dommeLat.oberarm||0;
  const kevH = NUTZER_GROESSE.Kev;
  const dommeH = NUTZER_GROESSE.Domme;

  // BMI
  const bmi = (gew,h) => gew ? (gew/((h/100)**2)).toFixed(1) : '—';
  // Kraft/Körpergewicht ratio (Back Pressure)
  const kevTraining = alleDatenVon('Kev','training');
  const dommeTraining = alleDatenVon('Domme','training');
  const getMax = (training,name) => {
    let m=0;
    training.forEach(s=>s.daten.exercises?.filter(e=>e.name===name).forEach(ex=>ex.sets?.forEach(st=>{if(+st.weight>m)m=+st.weight;})));
    return m||0;
  };
  const kevBP = getMax(kevTraining,'Back Pressure Gurt');
  const dommeBP = getMax(dommeTraining,'Back Pressure Gurt');

  const total = (a,b) => (a+b)||1;

  const barRow = (label, kevVal, dommeVal, unit) => {
    const t=total(kevVal,dommeVal);
    const kevPct=kevVal?(kevVal/t*100).toFixed(0):0;
    const dommePct=dommeVal?(dommeVal/t*100).toFixed(0):0;
    return `
      <div class="vs-bar-row">
        <div class="vs-bar-label">
          <span style="color:var(--kev)">${kevVal||'—'}${unit}</span>
          <span style="letter-spacing:.1em">${label}</span>
          <span style="color:var(--domme)">${dommeVal||'—'}${unit}</span>
        </div>
        <div class="vs-bar-track">
          <div class="vs-bar-kev" style="width:${kevPct}%"></div>
          <div class="vs-bar-domme" style="width:${dommePct}%"></div>
        </div>
      </div>`;
  };

  let html = `
    <div class="vs-header">
      <div class="vs-title"><span class="kev-c">Kev</span> <span style="color:#222">vs</span> <span class="domme-c">Domme</span></div>
    </div>

    <div class="vs-bmi-card">
      <div class="vs-bmi-title">Körperkomposition</div>
      <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:8px;margin-bottom:14px;align-items:center">
        <div style="text-align:left">
          <div style="font-size:.5rem;color:#888;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px">Kev</div>
          <div class="vs-val kev-c">${kevGew||'—'}<span class="vs-unit"> kg</span></div>
          <div style="font-size:.6rem;color:#888;margin-top:2px">${kevH}cm · BMI ${bmi(kevGew,kevH)}</div>
        </div>
        <div class="vs-divider">VS</div>
        <div style="text-align:right">
          <div style="font-size:.5rem;color:#888;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px">Domme</div>
          <div class="vs-val domme-c">${dommeGew||'—'}<span class="vs-unit"> kg</span></div>
          <div style="font-size:.6rem;color:#888;margin-top:2px">${dommeH}cm · BMI ${bmi(dommeGew,dommeH)}</div>
        </div>
      </div>
      ${barRow('Körpergewicht', kevGew, dommeGew, 'kg')}
    </div>

    <div class="vs-bmi-card">
      <div class="vs-bmi-title">Armmaße</div>
      ${barRow('Unterarm', kevUA, dommeUA, 'cm')}
      ${barRow('Oberarm', kevOA, dommeOA, 'cm')}
    </div>

    <div class="vs-bmi-card">
      <div class="vs-bmi-title">Kraftwerte</div>
      ${barRow('Back Pressure (kg)', kevBP, dommeBP, 'kg')}
      ${kevGew&&kevBP?barRow('Kraft/KG Ratio', (kevBP/kevGew).toFixed(2)*100|0, dommeBP&&dommeGew?(dommeBP/dommeGew).toFixed(2)*100|0:0, '%'):''}
    </div>

    ${(!kevGew&&!dommeGew)?`<div class="no-data" style="margin-top:20px">Erst Maße eintragen um den Vergleich zu sehen.</div>`:''}
  `;

  document.getElementById('page-vergleich').innerHTML = html;
}

  expandiert[key] = !expandiert[key];
  renderTab(aktiverTab);
