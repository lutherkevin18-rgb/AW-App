<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Iron Grip</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0d0d;--surface:#181818;--surface2:#1e1e1e;--border:#2e2e2e;--border2:#3a3a3a;
  --accent:#e85d04;--accent2:#f48c06;--text:#ede9e0;
  --kev:#e85d04;--domme:#4361ee;
}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:3px;background:#0a0a0a;}
::-webkit-scrollbar-thumb{background:#333;border-radius:2px;}
input,select,textarea{font-family:'DM Mono',monospace!important;}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.4);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* NUTZER WAHL */
#nutzer-screen{
  position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:999;gap:2rem;
}
.nw-logo{font-family:'Bebas Neue',monospace;font-size:2.8rem;color:var(--accent);letter-spacing:.08em;}
.nw-sub{font-size:.7rem;color:#666;letter-spacing:.18em;text-transform:uppercase;margin-top:-.5rem;}
.nw-btns{display:flex;gap:1rem;}
.nw-btn{
  padding:1rem 2.2rem;border:2px solid #333;background:none;
  color:#666;font-family:'Bebas Neue',monospace;font-size:1.8rem;letter-spacing:.06em;
  border-radius:8px;cursor:pointer;transition:all .2s;
}
.nw-btn.kev{border-color:var(--kev);color:var(--kev);background:rgba(232,93,4,.08);}
.nw-btn.domme{border-color:var(--domme);color:var(--domme);background:rgba(67,97,238,.08);}

/* HEADER */
header{
  background:#080808;border-bottom:1px solid #1a1a1a;padding:10px 14px 8px;
  display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;z-index:100;
}
.h-title{font-family:'Bebas Neue',monospace;font-size:1.5rem;color:var(--accent);letter-spacing:.08em;}
.h-sub{font-size:.6rem;color:#444;letter-spacing:.16em;text-transform:uppercase;}
.h-user{
  font-family:'Bebas Neue',monospace;font-size:1.1rem;letter-spacing:.06em;
  padding:.3rem .8rem;border-radius:5px;cursor:pointer;border:1px solid;transition:all .2s;
}
.h-user.kev{color:var(--kev);border-color:var(--kev);background:rgba(232,93,4,.08);}
.h-user.domme{color:var(--domme);border-color:var(--domme);background:rgba(67,97,238,.08);}

/* TABS */
.tabs{
  display:flex;border-bottom:1px solid #1a1a1a;background:#0c0c0c;
  position:sticky;top:57px;z-index:99;
}
.tab-btn{
  flex:1;padding:11px 4px;font-size:.55rem;font-weight:500;letter-spacing:.16em;
  text-transform:uppercase;background:none;border:none;color:#555;cursor:pointer;
  transition:all .2s;border-bottom:2px solid transparent;font-family:'DM Mono',monospace;
}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}

/* BODY */
.body{padding:12px 13px;max-width:500px;margin:0 auto;}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:7px;margin-bottom:9px;overflow:hidden;animation:fadeUp .3s ease both;}
.card-head{padding:9px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.card-body{padding:11px 12px;}

/* INPUTS */
.lbl{font-size:.55rem;color:#666;letter-spacing:.16em;text-transform:uppercase;margin-bottom:3px;margin-top:9px;display:block;}
.inp{width:100%;background:#111;border:1px solid #2a2a2a;border-radius:5px;padding:7px 9px;color:var(--text);font-size:.85rem;outline:none;}
.inp:focus{border-color:#444;}
.s-inp{width:100%;background:#111;border:1px solid #252525;border-radius:5px;padding:5px 7px;color:var(--text);font-size:.8rem;outline:none;}
textarea.inp{resize:vertical;min-height:60px;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 13px;border-radius:5px;border:none;font-family:'DM Mono',monospace;font-size:.75rem;letter-spacing:.06em;cursor:pointer;transition:all .15s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent2);}
.btn-domme{background:var(--domme);color:#fff;}
.btn-domme:hover{background:#3451d1;}
.btn-ghost{background:none;border:1px solid #333;color:#777;}
.btn-ghost:hover{border-color:#555;color:#bbb;}
.btn-danger{background:none;border:1px solid #5a2a2a;color:#cc4444;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-full{width:100%;justify-content:center;padding:10px;}

/* BADGES */
.badge{display:inline-block;font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border-radius:3px;}
.badge-strength{background:rgba(232,93,4,.15);color:#e85d04;}
.badge-iso{background:rgba(106,153,78,.15);color:#6a994e;}
.badge-sparring{background:rgba(67,97,238,.15);color:#4361ee;}
.badge-technique{background:rgba(114,9,183,.15);color:#9b5de5;}

/* MISC */
.no-data{text-align:center;color:#444;padding:30px 0;font-size:.7rem;letter-spacing:.1em;}
.status{text-align:center;font-size:.75rem;margin-top:8px;min-height:1.1rem;color:#666;}
.status.ok{color:#4cff91;}
.status.err{color:#ff4444;}
.pill{padding:4px 9px;border:1px solid #2e2e2e;border-radius:20px;background:none;color:#777;font-family:'DM Mono',monospace;font-size:.65rem;cursor:pointer;transition:all .15s;}
.pill:hover{border-color:#555;color:#bbb;}
.preset-pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.set-grid{display:grid;grid-template-columns:1.2fr 1fr 1.2fr auto;gap:5px;align-items:center;}
.set-hdr span{font-size:.52rem;color:#555;letter-spacing:.1em;text-transform:uppercase;}

/* HERO */
.hero{position:relative;overflow:hidden;background:#0c0c0c;border-bottom:1px solid #1a1a1a;}
.hero-dots{position:absolute;inset:0;background-image:radial-gradient(#222 1px,transparent 1px);background-size:18px 18px;opacity:.5;}
.hero-stripe{position:absolute;top:0;left:0;right:0;height:2px;}
.hero-inner{position:relative;padding:14px 14px 10px;}
.hero-tag{font-size:.55rem;color:var(--accent);letter-spacing:.2em;text-transform:uppercase;margin-bottom:8px;}
.rings-grid{display:grid;grid-template-columns:1fr 1fr 1fr;}
.ring-wrap{text-align:center;animation:fadeUp .5s ease both;}
.ring-lbl{font-size:.5rem;color:#666;letter-spacing:.12em;text-transform:uppercase;margin-top:3px;}
.stat-strip{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;border-top:1px solid #222;}
.stat-cell{text-align:center;padding:8px 4px;border-right:1px solid #1a1a1a;}
.stat-cell:last-child{border-right:none;}
.stat-lbl{font-size:.48rem;color:#666;letter-spacing:.12em;text-transform:uppercase;margin-bottom:2px;}
.stat-val{font-family:'Bebas Neue',monospace;font-size:1rem;color:#ddd;line-height:1;}

/* CHARTS */
.chart-mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px;}

/* VERGLEICH */
.vs-header{text-align:center;padding:20px 0 10px;}
.vs-title{font-family:'Bebas Neue',monospace;font-size:2rem;letter-spacing:.1em;}
.kev-c{color:var(--kev);}
.domme-c{color:var(--domme);}
.vs-card{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:12px;margin-bottom:9px;}
.vs-card-title{font-size:.6rem;color:#777;letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px;}
.vs-bar-row{margin-bottom:10px;}
.vs-bar-lbl{display:flex;justify-content:space-between;font-size:.6rem;margin-bottom:4px;}
.vs-bar-track{height:6px;background:#1a1a1a;border-radius:3px;overflow:hidden;display:flex;}
.vs-bar-kev{height:100%;background:var(--kev);transition:width 1s ease;}
.vs-bar-domme{height:100%;background:var(--domme);transition:width 1s ease;}
.vs-divider{font-family:'Bebas Neue',monospace;font-size:1.2rem;color:#333;text-align:center;}
.vs-val{font-family:'Bebas Neue',monospace;font-size:1.6rem;line-height:1;}
</style>
</head>
<body>

<div id="nutzer-screen">
  <div>
    <div class="nw-logo">Iron Grip</div>
    <div class="nw-sub">Armwrestling Tracker</div>
  </div>
  <div class="nw-btns">
    <button class="nw-btn kev" onclick="setNutzer('Kev')">Kev</button>
    <button class="nw-btn domme" onclick="setNutzer('Domme')">Domme</button>
  </div>
</div>

<div id="app" style="display:none;">
  <header>
    <div>
      <div class="h-title">Iron Grip</div>
      <div class="h-sub">Armwrestling Tracker</div>
    </div>
    <button class="h-user kev" id="h-user-btn" onclick="wechselNutzer()">Kev</button>
  </header>
  <div class="tabs">
    <button class="tab-btn active" id="tab-training" onclick="setTab('training')">Training</button>
    <button class="tab-btn" id="tab-masse" onclick="setTab('masse')">Maße</button>
    <button class="tab-btn" id="tab-charts" onclick="setTab('charts')">Charts</button>
    <button class="tab-btn" id="tab-vergleich" onclick="setTab('vergleich')">Vergleich</button>
  </div>
  <div class="body">
    <div id="page-training"></div>
    <div id="page-masse" style="display:none;"></div>
    <div id="page-charts" style="display:none;"></div>
    <div id="page-vergleich" style="display:none;"></div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxR6JAcv6ClH4PiKSHFG_TmNtz4oQPXSglZ2amPMg7Ods3pdQaF2SFl34FE62oY5Kc/exec';

const GROESSE = { Kev:174, Domme:181 };
const PRESET = [
  {name:'Back Pressure Gurt',unit:'kg',type:'strength'},
  {name:'Micros',unit:'kg',type:'strength'},
  {name:'Hammer Curls',unit:'kg',type:'strength'},
  {name:'Dome High-Pulls',unit:'kg',type:'iso'},
  {name:'Pronation u. Last',unit:'kg',type:'strength'},
  {name:'HG-Extension',unit:'kg',type:'strength'},
  {name:'1-vs-2 Redlining',unit:'Runden',type:'sparring'},
  {name:'Toproll Positions',unit:'min',type:'technique'},
];
const MASS_FELDER = [
  {key:'bodyweight',label:'Körpergewicht',unit:'kg'},
  {key:'unterarm',label:'Unterarm',unit:'cm'},
  {key:'oberarm',label:'Oberarm',unit:'cm'},
  {key:'handgelenk',label:'Handgelenk',unit:'cm'},
  {key:'phasenwinkel',label:'Phasenwinkel',unit:'°'},
];

let nutzer = null;
let tab = 'training';
let daten = [];
let exp = {};
let tForm = {date:'',notes:'',exercises:[]};
let tOffen = false;
let mForm = {date:''};
let mOffen = false;
let chartMode = 'exercise';
let chartEx = PRESET[0].name;
let chartM = 'bodyweight';

const today = () => new Date().toISOString().slice(0,10);
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const fmt = d => {
  try {
    const s = String(d).slice(0,10);
    const [y,m,day] = s.split('-');
    return new Date(+y, +m-1, +day).toLocaleDateString('de-DE',{day:'2-digit',month:'short',year:'2-digit'});
  } catch(e) { return String(d).slice(0,10); }
};
const nutzerColor = () => nutzer==='Kev' ? 'btn-primary' : 'btn-domme';
const accentColor = () => nutzer==='Kev' ? '#e85d04' : '#4361ee';

// ── NUTZER ──────────────────────────────────────────────
function setNutzer(n) {
  nutzer = n;
  document.getElementById('nutzer-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  const btn = document.getElementById('h-user-btn');
  btn.textContent = n;
  btn.className = 'h-user ' + (n==='Kev'?'kev':'domme');
  document.documentElement.style.setProperty('--accent', n==='Kev'?'#e85d04':'#4361ee');
  document.documentElement.style.setProperty('--accent2', n==='Kev'?'#f48c06':'#3451d1');
  tForm = {date:today(),notes:'',exercises:[]};
  mForm = {date:today()};
  MASS_FELDER.forEach(f=>mForm[f.key]='');
  laden().then(()=>renderTab(tab));
}

function wechselNutzer() {
  nutzer = null;
  document.getElementById('nutzer-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.documentElement.style.setProperty('--accent','#e85d04');
  document.documentElement.style.setProperty('--accent2','#f48c06');
}

// ── TABS ────────────────────────────────────────────────
function setTab(t) {
  tab = t;
  ['training','masse','charts','vergleich'].forEach(x => {
    document.getElementById('tab-'+x).classList.toggle('active', x===t);
    document.getElementById('page-'+x).style.display = x===t?'block':'none';
  });
  renderTab(t);
}

function renderTab(t) {
  if(t==='training') renderTraining();
  else if(t==='masse') renderMasse();
  else if(t==='charts') renderCharts();
  else if(t==='vergleich') renderVergleich();
}

// ── DATEN ────────────────────────────────────────────────
async function laden() {
  try {
    const r = await fetch(SCRIPT_URL+'?action=read&t='+Date.now());
    const json = await r.json();
    const rows = json.data || [];
    daten = rows.slice(1)
      .filter(r => r[1] && r[2] && r[4])
      .map(r => {
        let d = {};
        try { d = typeof r[4]==='string' ? JSON.parse(r[4]) : r[4]; } catch(e) {}
        return {
          ts: String(r[0]),
          nutzer: String(r[1]),
          typ: String(r[2]),
          datum: String(r[3]).replace(/^'/,'').slice(0,10),
          daten: d
        };
      })
      .filter(r => r.daten && Object.keys(r.daten).length > 0);
  } catch(e) {
    console.error('Laden fehlgeschlagen:', e);
  }
}

function meine(typ) {
  return daten.filter(r=>r.nutzer===nutzer&&r.typ===typ).sort((a,b)=>b.datum.localeCompare(a.datum));
}

function von(n, typ) {
  return daten.filter(r=>r.nutzer===n&&r.typ===typ).sort((a,b)=>b.datum.localeCompare(a.datum));
}

async function speichern(typ, datum, d) {
  const payload = encodeURIComponent(JSON.stringify({nutzer, typ, datum, daten:d}));
  try {
    await fetch(SCRIPT_URL+'?action=write&payload='+payload, {mode:'no-cors'});
  } catch(e) {}
  await new Promise(r=>setTimeout(r,2500));
  await laden();
}

// ── RING ────────────────────────────────────────────────
function ring(value, unit, label, progress, color, i=0) {
  const SZ=88, r=31, cx=44, cy=44;
  const C=2*Math.PI*r, p=Math.max(0,Math.min(1,progress||0));
  const dash=C*p;
  const ta=((p)*360-90)*Math.PI/180;
  const tx=cx+r*Math.cos(ta), ty=cy+r*Math.sin(ta);
  const ticks=Array.from({length:32},(_,i)=>{
    const a=(i/32*360-90)*Math.PI/180, major=i%8===0, ro=r+7, rl=major?5:2.5;
    return `<line x1="${cx+ro*Math.cos(a)}" y1="${cy+ro*Math.sin(a)}" x2="${cx+(ro+rl)*Math.cos(a)}" y2="${cy+(ro+rl)*Math.sin(a)}" stroke="${major?'#2a2a2a':'#1e1e1e'}" stroke-width="${major?1.2:.7}"/>`;
  }).join('');
  return `<div class="ring-wrap" style="animation-delay:${i*.15}s">
    <svg width="${SZ}" height="${SZ}" style="overflow:visible">
      ${ticks}
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#181818" stroke-width="6"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="5" stroke-linecap="round"
        stroke-dasharray="${C}" stroke-dashoffset="${C-dash}" transform="rotate(-90 ${cx} ${cy})"
        style="filter:drop-shadow(0 0 5px ${color}88);transition:stroke-dashoffset 1.2s cubic-bezier(.34,1.2,.64,1)"/>
      ${p>0.03?`<circle cx="${tx}" cy="${ty}" r="3" fill="${color}" style="filter:drop-shadow(0 0 4px ${color})"/>`:''}
      <text x="${cx}" y="${cy-5}" text-anchor="middle" style="font-family:'Bebas Neue',monospace;font-size:16px;fill:#ede9e0">${value}</text>
      <text x="${cx}" y="${cy+10}" text-anchor="middle" style="font-family:'DM Mono',monospace;font-size:7px;fill:#666">${unit}</text>
    </svg>
    <div class="ring-lbl">${label}</div>
  </div>`;
}

// ── HERO ────────────────────────────────────────────────
function hero() {
  const masse = meine('masse');
  const training = meine('training');
  const lat = masse[0]?.daten || {};
  const cw = +lat.bodyweight||0;
  const color = accentColor();
  const getMax = name => {
    let m=0;
    training.forEach(s=>s.daten.exercises?.filter(e=>e.name===name).forEach(ex=>ex.sets?.forEach(st=>{if(+st.weight>m)m=+st.weight;})));
    return m||0;
  };
  const bp=getMax('Back Pressure Gurt'), mic=getMax('Micros');
  return `<div class="hero">
    <div class="hero-dots"></div>
    <div class="hero-stripe" style="background:linear-gradient(90deg,transparent,${color},transparent)"></div>
    <div class="hero-inner">
      <div class="hero-tag">${nutzer} — Übersicht</div>
      <div class="rings-grid">
        ${ring(cw?cw.toFixed(1):'—','kg','Gewicht',cw/120,color,0)}
        ${ring(bp||'—','kg','Back Pressure',bp/75,color,1)}
        ${ring(mic||'—','kg','Micros',mic/75,color,2)}
      </div>
      <div class="stat-strip">
        ${[['UA',lat.unterarm?lat.unterarm+'cm':'—'],['OA',lat.oberarm?lat.oberarm+'cm':'—'],['HG',lat.handgelenk?lat.handgelenk+'cm':'—'],['PW',lat.phasenwinkel?lat.phasenwinkel+'°':'—']].map(([l,v])=>`
          <div class="stat-cell"><div class="stat-lbl">${l}</div><div class="stat-val">${v}</div></div>`).join('')}
      </div>
    </div>
  </div>`;
}

// ── TRAINING ────────────────────────────────────────────
function renderTraining() {
  const sessions = meine('training');
  let html = hero();
  if(!tOffen) {
    html += `<button class="btn ${nutzerColor()} btn-full" style="margin:12px 0 10px" onclick="tOeffnen()">+ Neue Einheit</button>`;
  } else {
    html += tFormHTML();
  }
  if(!sessions.length) {
    html += `<div class="no-data">— noch keine Einheiten —</div>`;
  } else {
    sessions.forEach(s => {
      const open = exp['t_'+s.ts];
      html += `<div class="card">
        <div class="card-head">
          <div style="display:flex;gap:8px;align-items:center">
            <span style="font-family:'Bebas Neue',monospace;font-size:1.1rem;color:var(--accent)">${fmt(s.datum)}</span>
            <span style="color:#777;font-size:.65rem">${s.daten.exercises?.length||0} Übungen</span>
          </div>
          <button class="btn btn-ghost" style="padding:3px 8px;font-size:.6rem" onclick="toggleExp('t_${s.ts}')">${open?'▲':'▼'}</button>
        </div>
        ${open ? tDetailHTML(s) : ''}
      </div>`;
    });
  }
  document.getElementById('page-training').innerHTML = html;
}

function tFormHTML() {
  let exHtml = '';
  tForm.exercises.forEach((ex,ei) => {
    exHtml += `<div class="card" style="border-color:#252525;margin-bottom:8px">
      <div class="card-head">
        <div style="display:flex;gap:6px;align-items:center">
          <span style="font-size:.75rem;font-weight:600">${ex.name}</span>
          <span class="badge badge-${ex.type}">${ex.type}</span>
        </div>
        <button class="btn btn-danger" style="padding:2px 6px;font-size:.6rem" onclick="rmEx(${ei})">✕</button>
      </div>
      <div style="padding:8px 11px">
        <div class="set-grid set-hdr" style="margin-bottom:4px">
          <span>Last (${ex.unit})</span><span>Wdh.</span><span>Notiz</span><span></span>
        </div>
        ${ex.sets.map((s,si)=>`<div class="set-grid" style="margin-bottom:4px">
          <input class="s-inp" placeholder="—" value="${s.weight}" oninput="upSet(${ei},${si},'weight',this.value)">
          <input class="s-inp" placeholder="—" value="${s.reps}" oninput="upSet(${ei},${si},'reps',this.value)">
          <input class="s-inp" placeholder="—" value="${s.notes}" oninput="upSet(${ei},${si},'notes',this.value)">
          <button style="background:none;border:none;cursor:pointer;color:#cc4444;font-size:.7rem" onclick="rmSet(${ei},${si})">✕</button>
        </div>`).join('')}
        <button class="btn btn-ghost" style="font-size:.6rem;padding:3px 8px;margin-top:2px" onclick="addSet(${ei})">+ Satz</button>
      </div>
    </div>`;
  });
  return `<div class="card" style="margin:12px 0 10px">
    <div class="card-head">
      <span style="font-size:.7rem;color:var(--accent);letter-spacing:.14em;font-weight:600">NEUE EINHEIT</span>
      <button class="btn btn-ghost" style="font-size:.65rem;padding:4px 8px" onclick="tSchliessen()">Abbrechen</button>
    </div>
    <div class="card-body">
      <label class="lbl">Datum</label>
      <input type="date" class="inp" value="${tForm.date}" oninput="tForm.date=this.value">
      <label class="lbl">Preset-Übungen</label>
      <div class="preset-pills">${PRESET.map(ex=>`<button class="pill" onclick="addEx('${ex.name}','${ex.unit}','${ex.type}')">${ex.name}</button>`).join('')}</div>
      <div style="display:flex;gap:6px;margin-bottom:10px">
        <input class="inp" id="cust-inp" placeholder="Eigene Übung…" style="flex:1">
        <button class="btn btn-ghost" style="font-size:.65rem" onclick="addCustEx()">+</button>
      </div>
      ${exHtml}
      <label class="lbl">Session-Notizen</label>
      <textarea class="inp" placeholder="Notizen…" oninput="tForm.notes=this.value">${tForm.notes}</textarea>
      <button class="btn ${nutzerColor()} btn-full" style="margin-top:12px" id="save-t-btn" onclick="tSpeichern()">Einheit speichern</button>
      <div class="status" id="status-t"></div>
    </div>
  </div>`;
}

function tDetailHTML(s) {
  let html = `<div class="card-body">`;
  (s.daten.exercises||[]).forEach(ex => {
    html += `<div style="margin-bottom:9px">
      <div style="display:flex;gap:6px;align-items:center;margin-bottom:4px">
        <span style="font-size:.75rem;font-weight:600">${ex.name}</span>
        <span class="badge badge-${ex.type}">${ex.type}</span>
      </div>`;
    (ex.sets||[]).forEach((st,j) => {
      html += `<div style="display:flex;gap:10px;font-size:.7rem;color:#888;padding:2px 0">
        <span style="color:#444">#${j+1}</span>
        <span style="color:#ccc">${st.weight} ${ex.unit}</span>
        ${st.reps?`<span>× ${st.reps}</span>`:''}
        ${st.notes?`<span style="color:#666;font-style:italic">— ${st.notes}</span>`:''}
      </div>`;
    });
    html += `</div>`;
  });
  if(s.daten.notes) html += `<div style="margin-top:6px;padding:6px 9px;background:#111;border-radius:4px;font-size:.7rem;color:#777;font-style:italic">${s.daten.notes}</div>`;
  html += `</div>`;
  return html;
}

function tOeffnen() { tOffen=true; tForm={date:today(),notes:'',exercises:[]}; renderTraining(); }
function tSchliessen() { tOffen=false; renderTraining(); }
function addEx(name,unit,type) { tForm.exercises.push({name,unit,type,sets:[{weight:'',reps:'',notes:''}]}); renderTraining(); }
function addCustEx() { const i=document.getElementById('cust-inp'); if(i&&i.value.trim()){addEx(i.value.trim(),'—','strength');} }
function rmEx(i) { tForm.exercises.splice(i,1); renderTraining(); }
function addSet(ei) { tForm.exercises[ei].sets.push({weight:'',reps:'',notes:''}); renderTraining(); }
function rmSet(ei,si) { tForm.exercises[ei].sets.splice(si,1); renderTraining(); }
function upSet(ei,si,f,v) { tForm.exercises[ei].sets[si][f]=v; }

async function tSpeichern() {
  if(!tForm.exercises.length) return;
  const btn=document.getElementById('save-t-btn');
  const st=document.getElementById('status-t');
  btn.disabled=true; st.textContent='Wird gespeichert…'; st.className='status';
  await speichern('training', tForm.date, {exercises:tForm.exercises, notes:tForm.notes});
  tOffen=false; tForm={date:today(),notes:'',exercises:[]};
  renderTraining();
}

// ── MASSE ────────────────────────────────────────────────
function renderMasse() {
  const masse = meine('masse');
  let html = '';
  if(!mOffen) {
    html += `<button class="btn ${nutzerColor()} btn-full" style="margin-bottom:12px" onclick="mOeffnen()">+ Neue Messung</button>`;
  } else {
    html += `<div class="card" style="margin-bottom:10px">
      <div class="card-head">
        <span style="font-size:.7rem;color:var(--accent);letter-spacing:.14em;font-weight:600">NEUE MESSUNG</span>
        <button class="btn btn-ghost" style="font-size:.65rem;padding:4px 8px" onclick="mSchliessen()">Abbrechen</button>
      </div>
      <div class="card-body">
        <label class="lbl">Datum</label>
        <input type="date" class="inp" value="${mForm.date}" oninput="mForm.date=this.value">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px">
          ${MASS_FELDER.map(f=>`<div>
            <label class="lbl">${f.label} <span style="color:#444">(${f.unit})</span></label>
            <input type="number" class="s-inp" placeholder="—" value="${mForm[f.key]||''}" oninput="mForm['${f.key}']=this.value">
          </div>`).join('')}
        </div>
        <button class="btn ${nutzerColor()} btn-full" style="margin-top:14px" id="save-m-btn" onclick="mSpeichern()">Messung speichern</button>
        <div class="status" id="status-m"></div>
      </div>
    </div>`;
  }
  if(!masse.length) {
    html += `<div class="no-data">— noch keine Messungen —</div>`;
  } else {
    masse.forEach(m => {
      const open = exp['m_'+m.ts];
      html += `<div class="card">
        <div class="card-head">
          <span style="font-family:'Bebas Neue',monospace;font-size:1.1rem;color:var(--accent)">${fmt(m.datum)}</span>
          <button class="btn btn-ghost" style="padding:3px 8px;font-size:.6rem" onclick="toggleExp('m_${m.ts}')">${open?'▲':'▼'}</button>
        </div>
        ${open?`<div class="card-body" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          ${MASS_FELDER.map(f=>m.daten[f.key]?`<div>
            <div style="font-size:.55rem;color:#666;margin-bottom:2px">${f.label}</div>
            <div style="font-family:'Bebas Neue',monospace;font-size:1.4rem;color:#ede9e0">${m.daten[f.key]} <span style="font-size:.6rem;color:#555;font-family:'DM Mono',monospace">${f.unit}</span></div>
          </div>`:'').join('')}
        </div>`:''}
      </div>`;
    });
  }
  document.getElementById('page-masse').innerHTML = html;
}

function mOeffnen() { mOffen=true; mForm={date:today()}; MASS_FELDER.forEach(f=>mForm[f.key]=''); renderMasse(); }
function mSchliessen() { mOffen=false; renderMasse(); }
async function mSpeichern() {
  const btn=document.getElementById('save-m-btn');
  const st=document.getElementById('status-m');
  btn.disabled=true; st.textContent='Wird gespeichert…'; st.className='status';
  const d={};
  MASS_FELDER.forEach(f=>{ if(mForm[f.key]) d[f.key]=mForm[f.key]; });
  await speichern('masse', mForm.date, d);
  mOffen=false; renderMasse();
}

// ── CHARTS ──────────────────────────────────────────────
function renderCharts() {
  const training = meine('training');
  const masse = meine('masse');
  const color = accentColor();
  const colorFaded = color+'77';
  const allEx=[...new Set([...PRESET.map(e=>e.name),...training.flatMap(s=>s.daten.exercises?.map(e=>e.name)||[])])];

  const exData=[];
  [...training].sort((a,b)=>a.datum.localeCompare(b.datum)).forEach(s=>{
    s.daten.exercises?.filter(e=>e.name===chartEx).forEach(ex=>{
      const ws=ex.sets?.map(st=>+st.weight).filter(v=>!isNaN(v)&&v>0)||[];
      if(ws.length) exData.push({date:fmt(s.datum),max:Math.max(...ws),avg:+(ws.reduce((a,b)=>a+b,0)/ws.length).toFixed(1)});
    });
  });

  const mData=[...masse].sort((a,b)=>a.datum.localeCompare(b.datum)).filter(m=>m.daten[chartM]).map(m=>({date:fmt(m.datum),value:+m.daten[chartM]}));
  const mFeld=MASS_FELDER.find(f=>f.key===chartM);

  let html=`<div class="chart-mode-grid">
    <button class="btn ${chartMode==='exercise'?nutzerColor():'btn-ghost'}" onclick="setChartMode('exercise')">Übungen</button>
    <button class="btn ${chartMode==='measure'?nutzerColor():'btn-ghost'}" onclick="setChartMode('measure')">Maße</button>
  </div>`;

  if(chartMode==='exercise') {
    html+=`<label class="lbl">Übung</label>
    <select class="inp" style="cursor:pointer;margin-bottom:12px" onchange="chartEx=this.value;renderCharts()">
      ${allEx.map(n=>`<option value="${n}" ${n===chartEx?'selected':''}>${n}</option>`).join('')}
    </select>`;
    html+=exData.length<2?`<div class="no-data">Mindestens 2 Einheiten mit dieser Übung nötig.</div>`:`
      <div class="card">
        <div class="card-head"><span style="font-size:.65rem;letter-spacing:.1em">${chartEx}</span></div>
        <div style="padding:10px 4px">${lineChart(exData,['max','avg'],[color,colorFaded])}</div>
      </div>`;
  } else {
    html+=`<label class="lbl">Messgröße</label>
    <select class="inp" style="cursor:pointer;margin-bottom:12px" onchange="chartM=this.value;renderCharts()">
      ${MASS_FELDER.map(f=>`<option value="${f.key}" ${f.key===chartM?'selected':''}>${f.label} (${f.unit})</option>`).join('')}
    </select>`;
    html+=mData.length<2?`<div class="no-data">Mindestens 2 Messungen nötig.</div>`:`
      <div class="card">
        <div class="card-head"><span style="font-size:.65rem;letter-spacing:.1em">${mFeld?.label}</span></div>
        <div style="padding:10px 4px">${lineChart(mData,['value'],[color])}</div>
      </div>`;
  }
  document.getElementById('page-charts').innerHTML = html;
}

function setChartMode(m) { chartMode=m; renderCharts(); }

function lineChart(data, keys, colors) {
  if(data.length<2) return '';
  const W=340,H=160,PL=32,PR=10,PT=10,PB=28,IW=W-PL-PR,IH=H-PT-PB;
  const allV=data.flatMap(d=>keys.map(k=>d[k]||0));
  const minV=Math.min(...allV),maxV=Math.max(...allV),range=maxV-minV||1;
  const toX=i=>PL+(i/(data.length-1))*IW;
  const toY=v=>PT+IH-((v-minV)/range)*IH;
  let svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;overflow:visible">`;
  for(let i=0;i<=4;i++){
    const y=PT+IH*(i/4),v=(maxV-(range*i/4)).toFixed(1);
    svg+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="#252525" stroke-dasharray="3 3"/>`;
    svg+=`<text x="${PL-3}" y="${y+3}" text-anchor="end" style="font-family:'DM Mono',monospace;font-size:7px;fill:#666">${v}</text>`;
  }
  const step=Math.ceil(data.length/5);
  data.forEach((d,i)=>{
    if(i%step===0||i===data.length-1)
      svg+=`<text x="${toX(i)}" y="${H-4}" text-anchor="middle" style="font-family:'DM Mono',monospace;font-size:7px;fill:#666">${d.date}</text>`;
  });
  keys.forEach((k,ki)=>{
    svg+=`<polyline points="${data.map((d,i)=>`${toX(i)},${toY(d[k]||0)}`).join(' ')}" fill="none" stroke="${colors[ki]}" stroke-width="${ki===0?2:1.5}" stroke-linejoin="round" stroke-linecap="round" opacity="${ki===0?1:.6}"/>`;
    if(ki===0) data.forEach((d,i)=>{ svg+=`<circle cx="${toX(i)}" cy="${toY(d[k]||0)}" r="3" fill="${colors[ki]}" style="filter:drop-shadow(0 0 3px ${colors[ki]})"/>`; });
  });
  svg+=`</svg>`;
  return svg;
}

// ── VERGLEICH ────────────────────────────────────────────
function renderVergleich() {
  const kM=von('Kev','masse')[0]?.daten||{};
  const dM=von('Domme','masse')[0]?.daten||{};
  const kT=von('Kev','training'), dT=von('Domme','training');
  const kGew=+kM.bodyweight||0, dGew=+dM.bodyweight||0;
  const kUA=+kM.unterarm||0, dUA=+dM.unterarm||0;
  const kOA=+kM.oberarm||0, dOA=+dM.oberarm||0;
  const bmi=(g,h)=>g?(g/((h/100)**2)).toFixed(1):'—';
  const getMax=(t,name)=>{ let m=0; t.forEach(s=>s.daten.exercises?.filter(e=>e.name===name).forEach(ex=>ex.sets?.forEach(st=>{if(+st.weight>m)m=+st.weight;}))); return m||0; };
  const kBP=getMax(kT,'Back Pressure Gurt'), dBP=getMax(dT,'Back Pressure Gurt');

  const barRow=(label,kVal,dVal,unit)=>{
    const t=(kVal+dVal)||1;
    const kP=kVal?(kVal/t*100).toFixed(0):0, dP=dVal?(dVal/t*100).toFixed(0):0;
    return `<div class="vs-bar-row">
      <div class="vs-bar-lbl">
        <span class="kev-c">${kVal||'—'}${unit}</span>
        <span style="color:#555;font-size:.55rem;letter-spacing:.1em;text-transform:uppercase">${label}</span>
        <span class="domme-c">${dVal||'—'}${unit}</span>
      </div>
      <div class="vs-bar-track">
        <div class="vs-bar-kev" style="width:${kP}%"></div>
        <div class="vs-bar-domme" style="width:${dP}%"></div>
      </div>
    </div>`;
  };

  let html=`<div class="vs-header">
    <div class="vs-title"><span class="kev-c">Kev</span> <span style="color:#333">vs</span> <span class="domme-c">Domme</span></div>
  </div>
  <div class="vs-card">
    <div class="vs-card-title">Körperkomposition</div>
    <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:8px;margin-bottom:14px;align-items:center">
      <div>
        <div style="font-size:.5rem;color:#666;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px">Kev</div>
        <div class="vs-val kev-c">${kGew||'—'}<span style="font-size:.55rem;color:#555"> kg</span></div>
        <div style="font-size:.6rem;color:#666;margin-top:2px">${GROESSE.Kev}cm · BMI ${bmi(kGew,GROESSE.Kev)}</div>
      </div>
      <div class="vs-divider">VS</div>
      <div style="text-align:right">
        <div style="font-size:.5rem;color:#666;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px">Domme</div>
        <div class="vs-val domme-c">${dGew||'—'}<span style="font-size:.55rem;color:#555"> kg</span></div>
        <div style="font-size:.6rem;color:#666;margin-top:2px">${GROESSE.Domme}cm · BMI ${bmi(dGew,GROESSE.Domme)}</div>
      </div>
    </div>
    ${barRow('Körpergewicht',kGew,dGew,'kg')}
  </div>
  <div class="vs-card">
    <div class="vs-card-title">Armmaße</div>
    ${barRow('Unterarm',kUA,dUA,'cm')}
    ${barRow('Oberarm',kOA,dOA,'cm')}
  </div>
  <div class="vs-card">
    <div class="vs-card-title">Kraftwerte</div>
    ${barRow('Back Pressure',kBP,dBP,'kg')}
    ${kGew&&kBP&&dGew&&dBP?barRow('Kraft/KG Ratio',Math.round(kBP/kGew*100),Math.round(dBP/dGew*100),'%'):''}
  </div>
  ${!kGew&&!dGew?`<div class="no-data" style="margin-top:20px">Erst Maße eintragen um den Vergleich zu sehen.</div>`:''}`;

  document.getElementById('page-vergleich').innerHTML = html;
}
